appId: com.antoniozhong.autosense
name: "autosense firebase smoke"

---
- launchApp:
    clearState: true
    clearKeychain: true

- runFlow:
    when:
      visible: ".*8083.*"
    commands:
      - tapOn: ".*8083.*"

- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Close"
    commands:
      - tapOn: "Close"
      - waitForAnimationToEnd

- assertVisible: "Crear cuenta"
- tapOn: "Crear cuenta"

- assertVisible: "Correo electrónico"
- tapOn: "tu@correo.com"
- setClipboard: "${SMOKE_EMAIL}"
- pasteText
- inputText: "1"
- eraseText: 1
- pressKey: Enter
- tapOn: "Continuar"

- assertVisible: "Nombre completo"
- tapOn:
    point: "50%,51%"
- inputText: "${SMOKE_NAME}"
- pressKey: Enter
- tapOn: "Continuar"

- assertVisible: "Contraseña nueva"
- tapOn:
    point: "50%,51%"
- inputText: "${SMOKE_PASSWORD}"
- pressKey: Enter
- tapOn:
    point: "50%,62%"
- inputText: "${SMOKE_PASSWORD}"
- pressKey: Enter
- tapOn: "Crear cuenta"

- extendedWaitUntil:
    visible: "Honda Civic 1.5T"
    timeout: 15000

- tapOn: "Tiempo real"
- assertVisible: "Conecta tu OBD2"
- tapOn: "Conectar ahora"

- runFlow:
    when:
      visible: ".*(Allow While Using App|Permitir al usar la app).*"
    commands:
      - tapOn: ".*(Allow While Using App|Permitir al usar la app).*"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: ".*(Change to Always Allow|Cambiar a permitir siempre).*"
    commands:
      - tapOn: ".*(Change to Always Allow|Cambiar a permitir siempre).*"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible: "OBD2 en vivo"
    timeout: 15000

- extendedWaitUntil:
    visible: "Combustible"
    timeout: 8000

- tapOn: "Volver"
- tapOn: "Maps"
- assertVisible: "Historial de viajes"
- assertVisible: ".*Ruta automática.*"
- tapOn: ".*Ruta automática.*"
- assertVisible: "Ruta registrada"
- assertVisible: "Distancia"

- tapOn: "Perfil"
- assertVisible: "Mi perfil"
- assertVisible: "${SMOKE_NAME}"
- tapOn: "Salir.*Cerrar"

- extendedWaitUntil:
    visible: "Iniciar sesión"
    timeout: 15000

- tapOn: "tu@correo.com"
- setClipboard: "${SMOKE_EMAIL}"
- pasteText
- inputText: "1"
- eraseText: 1
- tapOn:
    point: "50%,55%"
- inputText: "${SMOKE_PASSWORD}"
- pressKey: Enter
- tapOn: "Iniciar sesión"

- extendedWaitUntil:
    visible: "Honda Civic 1.5T"
    timeout: 15000
